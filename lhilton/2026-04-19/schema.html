<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Journey AI — Schema Diagrams</title>
<style>
  :root {
    --primary: #6CB8BA;
    --primary-dark: #4a9a9c;
    --secondary: rgb(254, 109, 115);
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-hover: #273449;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --border: #334155;
    --new: #10b981;
    --modified: #f59e0b;
    --external: #64748b;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }

  body {
    display: grid;
    grid-template-rows: auto auto 1fr;
    min-height: 100vh;
    max-height: 100vh;
  }

  /* ───────── Header ───────── */
  header {
    padding: 14px 24px;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  header h1 .accent {
    background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 700;
  }

  header .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .legend {
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    border: 1px solid rgba(255, 255, 255, 0.2);
  }

  .dot.new      { background: var(--new); }
  .dot.modified { background: var(--modified); }
  .dot.external { background: var(--external); }

  /* ───────── Tab bar ───────── */
  .tabbar {
    display: flex;
    background: #0b1220;
    border-bottom: 1px solid var(--border);
    padding: 8px 18px;
    gap: 8px;
    align-items: center;
  }

  .tab {
    background: rgba(255, 255, 255, 0.03);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
    position: relative;
  }

  .tab:hover {
    color: var(--text);
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(108, 184, 186, 0.4);
  }

  .tab:active { transform: translateY(1px); }

  .tab[aria-selected="true"] {
    color: #0f172a;
    background: linear-gradient(135deg, var(--primary) 0%, #4a9a9c 100%);
    border-color: var(--primary);
    box-shadow: 0 4px 14px rgba(108, 184, 186, 0.35), inset 0 0 0 1px rgba(255, 255, 255, 0.15);
  }

  .tab[aria-selected="true"]:hover {
    filter: brightness(1.05);
  }

  .tabbar .spacer { flex: 1; }

  .tabbar .toolbar-inline {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tabbar .toolbar-inline button {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 11px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: all 0.15s ease;
  }

  .tabbar .toolbar-inline button:hover {
    background: var(--panel-hover);
    color: var(--text);
    border-color: var(--primary);
  }

  .tabbar .toolbar-inline button:active {
    transform: scale(0.97);
  }

  .tabbar .hint {
    font-size: 12px;
    color: var(--text-muted);
    padding: 0 12px;
    display: inline-flex;
    align-items: center;
    line-height: 1;
  }

  /* ───────── Main (tab panels) ───────── */
  main {
    position: relative;
    overflow: hidden;
    background: var(--panel);
    min-width: 0;
    min-height: 0;
  }

  .panel {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    transition: opacity 0.15s ease;
  }

  .panel[hidden] {
    display: none;
  }

  /* ───────── Canvas (diagram host) ───────── */
  .canvas {
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(circle at 25% 15%, rgba(108, 184, 186, 0.08) 0%, transparent 40%),
      radial-gradient(circle at 75% 85%, rgba(254, 109, 115, 0.06) 0%, transparent 40%),
      #ffffff;
    flex: 1;
    min-height: 0;
  }

  .canvas svg {
    width: 100% !important;
    height: 100% !important;
    max-width: none !important;
    max-height: none !important;
    display: block;
  }

  .canvas .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #475569;
    font-size: 14px;
    letter-spacing: 0.02em;
  }

  .canvas .loading .spinner {
    width: 24px;
    height: 24px;
    border: 3px solid #cbd5e1;
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 10px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ───────── Icon glyphs ───────── */
  .ico {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  @media (max-width: 720px) {
    header { padding: 10px 14px; gap: 12px; }
    header h1 { font-size: 14px; }
    .legend { gap: 8px; }
    .tabbar { padding: 6px 10px; gap: 6px; }
    .tab { padding: 8px 14px; font-size: 13px; }
    .tabbar .toolbar-inline button { padding: 4px 8px; font-size: 11px; }
    .tabbar .hint { display: none; }
  }
</style>

<!-- svg-pan-zoom (classic UMD build) -->
<script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.2/dist/svg-pan-zoom.min.js"></script>

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11.9.0/dist/mermaid.esm.min.mjs';

  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    themeVariables: {
      primaryColor: '#ffffff',
      primaryTextColor: '#0f172a',
      primaryBorderColor: '#475569',
      lineColor: '#64748b',
      secondaryColor: '#f1f5f9',
      tertiaryColor: '#e2e8f0',
      fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
      fontSize: '13px',
    },
    er: {
      layoutDirection: 'TB',
      minEntityWidth: 120,
      minEntityHeight: 80,
      entityPadding: 12,
      stroke: '#475569',
      fill: '#ffffff',
      useMaxWidth: false,
    },
    class: {
      useMaxWidth: false,
    },
    flowchart: {
      useMaxWidth: false,
    },
    maxTextSize: 200000,
    securityLevel: 'loose',
  });

  const panZooms = {};
  const rendered = {};
  const hints = {
    db:    'Tables + foreign keys',
    model: 'PHP classes + relationship methods',
  };

  async function renderDiagram(id) {
    if (rendered[id]) return;
    rendered[id] = true;
    const canvas = document.getElementById('canvas-' + id);
    const src = document.getElementById('src-' + id).textContent;
    try {
      const { svg } = await mermaid.render('svg-' + id, src);
      canvas.querySelector('.loading')?.remove();
      canvas.insertAdjacentHTML('beforeend', svg);
      const svgEl = canvas.querySelector('svg');
      svgEl.removeAttribute('style');
      svgEl.setAttribute('width', '100%');
      svgEl.setAttribute('height', '100%');
      svgEl.style.display = 'block';
      const pz = svgPanZoom(svgEl, {
        panEnabled: true,
        zoomEnabled: true,
        controlIconsEnabled: false,
        fit: true,
        center: true,
        minZoom: 0.1,
        maxZoom: 20,
        zoomScaleSensitivity: 0.25,
        dblClickZoomEnabled: true,
        mouseWheelZoomEnabled: true,
        preventMouseEventsDefault: true,
      });
      panZooms[id] = pz;
      const ro = new ResizeObserver(() => {
        if (!document.getElementById('panel-' + id).hidden) {
          pz.resize();
          pz.fit();
          pz.center();
        }
      });
      ro.observe(canvas);
    } catch (err) {
      canvas.innerHTML = '<div class="loading" style="color:#991b1b;">Render error: ' + err.message + '</div>';
      console.error('Mermaid render error for', id, err);
      rendered[id] = false;
    }
  }

  function currentTab() {
    return document.querySelector('.tab[aria-selected="true"]')?.dataset.target || 'db';
  }

  async function activateTab(id) {
    document.querySelectorAll('.tab').forEach(t => {
      t.setAttribute('aria-selected', t.dataset.target === id ? 'true' : 'false');
    });
    document.querySelectorAll('.panel').forEach(p => {
      p.hidden = p.id !== 'panel-' + id;
    });
    document.getElementById('hint-text').textContent = hints[id] || '';
    await renderDiagram(id);
    const pz = panZooms[id];
    if (pz) {
      // Defer so the panel is laid out before we measure/fit
      requestAnimationFrame(() => {
        pz.resize();
        pz.fit();
        pz.center();
      });
    }
  }

  // Tab wiring
  document.addEventListener('click', (e) => {
    const tabBtn = e.target.closest('.tab');
    if (tabBtn) {
      activateTab(tabBtn.dataset.target);
      return;
    }
    const toolBtn = e.target.closest('button[data-action]');
    if (!toolBtn) return;
    const pz = panZooms[currentTab()];
    if (!pz) return;
    switch (toolBtn.dataset.action) {
      case 'zoom-in':  pz.zoomBy(1.3); break;
      case 'zoom-out': pz.zoomBy(1 / 1.3); break;
      case 'fit':      pz.resize(); pz.fit(); pz.center(); break;
      case 'reset':    pz.resetZoom(); pz.resetPan(); pz.fit(); pz.center(); break;
    }
  });

  // Keyboard nav between tabs
  document.addEventListener('keydown', (e) => {
    if (e.target.closest('[role="tab"]')) {
      if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
        e.preventDefault();
        const current = currentTab();
        const other = current === 'db' ? 'model' : 'db';
        activateTab(other);
        document.getElementById('tab-' + other).focus();
      }
    }
  });

  // Initial render of the default (DB) tab
  activateTab('db');
</script>

        +array channel_grants

        +institution() BelongsTo~Institution~
