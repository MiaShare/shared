    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { font-family: 'Inter', sans-serif; background-color: #11142B; color: #ffffff; height: 100%; }
        body { display: flex; flex-direction: column; }
        header { background-color: #051014; border-bottom: 1px solid #2a2e4d; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; }
        .logo { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; }
        .logo svg { width: 100%; height: 100%; fill: white; }
        .header-label { font-size: 18px; font-weight: 600; color: white; }
        main { flex: 1; padding: 32px 24px; overflow-y: auto; }
        main::-webkit-scrollbar { width: 8px; }
        main::-webkit-scrollbar-track { background: #11142B; }
        main::-webkit-scrollbar-thumb { background: #3a3e5d; border-radius: 4px; }
        main::-webkit-scrollbar-thumb:hover { background: #4a4e6d; }
        .breadcrumbs { font-size: 13px; color: #7a7f9e; margin-bottom: 32px; max-width: 900px; margin-left: auto; margin-right: auto; }
        .breadcrumbs a { color: #5261CE; text-decoration: none; transition: color 0.25s ease; }
        .breadcrumbs a:hover { color: #FE6D73; }
        .breadcrumb-separator { margin: 0 6px; }
        .cards-container { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        .card { display: flex; flex-direction: row; background-color: #1a1e3d; border: 1px solid #2a2e4d; border-radius: 8px; overflow: hidden; text-decoration: none; color: inherit; transition: all 0.25s ease; }
        .card:hover { background-color: #1e2245; border-color: #3a3e5d; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3); }
        .card-left { width: 80px; background-color: rgba(82, 97, 206, 0.1); border-right: 3px solid #5261CE; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .card-left.file { border-right-color: #FE6D73; }
        .card-icon { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
        .card-icon svg { width: 44px; height: 44px; }
        .folder-icon { fill: #5261CE; }
        .file-icon { fill: #FE6D73; }
        .card-right { flex: 1; padding: 20px 24px; display: flex; flex-direction: column; justify-content: center; }
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .card-name { font-size: 18px; font-weight: 600; color: white; transition: color 0.25s ease; }
        .card:hover .card-name { color: #FE6D73; }
        .card-badge { background-color: rgba(82, 97, 206, 0.2); color: #5261CE; font-size: 12px; padding: 4px 12px; border-radius: 12px; white-space: nowrap; margin-left: 12px; }
        .card-summary { font-size: 14px; color: #7a7f9e; margin-bottom: 8px; word-break: break-word; }
        .card-date { font-size: 12px; color: #5a5f7e; }
        footer { padding: 24px; text-align: center; color: #7a7f9e; font-size: 13px; border-top: 1px solid #2a2e4d; }
        footer a { color: #5261CE; text-decoration: none; transition: color 0.25s ease; }
        footer a:hover { color: #FE6D73; }
        @media (max-width: 768px) {
            header { padding: 16px 20px; }
            main { padding: 24px 20px; }
            .cards-container { max-width: 100%; }
            .card { flex-direction: column; }
            .card-left { width: 100%; height: 60px; border-right: none; border-bottom: 3px solid #5261CE; }
            .card-left.file { border-bottom-color: #FE6D73; }
            .card-right { padding: 16px 20px; }
            .breadcrumbs { margin-bottom: 24px; }
        }
    </style>
